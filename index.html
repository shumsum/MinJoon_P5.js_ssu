<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 p5.js 작품 모음</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            margin-bottom: 10px;
        }

        header p {
            color: #555;
        }

        #projects {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .project {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }

        .project:hover {
            transform: translateY(-5px);
        }

        .project a {
            text-decoration: none;
            color: black;
            display: block;
        }

        .project img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }

        .info {
            padding: 20px;
        }

        .info h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .info p {
            color: #666;
            margin: 0;
        }

        @media (max-width: 800px) {
            #projects {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>p5.js 작품 포트폴리오</h1>
    <p>정적인 작품에서 동적인 작품으로 발전하는 과정을 담았습니다.</p>
</header>

<section id="projects">

    <!-- Abstract -->
    <div class="project">
        <a href="https://shumsum.github.io/MinJoon_P5.js_ssu/project1_Abstract/">
            <img src="./preview/abstract.png" alt="Abstract">

            <div class="info">
                <h2>Abstract</h2>
                <p>정적인 추상화 작품</p>
            </div>
        </a>
    </div>

    <!-- Moving Abstract -->
    <div class="project">
        <a href="https://shumsum.github.io/MinJoon_P5.js_ssu/project4_moving_Abstract/">
            <img src="./preview/moving_abstract.gif" alt="Moving Abstract">

            <div class="info">
                <h2>Moving Abstract</h2>
                <p>움직임이 추가된 추상화 작품</p>
            </div>
        </a>
    </div>

    <!-- My Face -->
    <div class="project">
        <a href="https://shumsum.github.io/MinJoon_P5.js_ssu/project2_myface/">
            <img src="./preview/myface.png" alt="My Face">

            <div class="info">
                <h2>My Face</h2>
                <p>정적인 자화상 작품</p>
            </div>
        </a>
    </div>

    <!-- Moving My Face -->
    <div class="project">
        <a href="https://shumsum.github.io/MinJoon_P5.js_ssu/project3_moving_myface/">
            <img src="./preview/moving_myface.gif" alt="Moving My Face">

            <div class="info">
                <h2>Moving My Face</h2>
                <p>움직임이 추가된 자화상 작품</p>
            </div>
        </a>
    </div>

</section>

</body>
</html>
