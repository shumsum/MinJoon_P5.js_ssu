<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 p5.js 작품 모음</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            margin-bottom: 10px;
        }

        #projects {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .project {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .project:hover {
            transform: translateY(-5px);
        }

        .project a {
            text-decoration: none;
            color: black;
            display: block;
        }

        .project h2 {
            margin-top: 0;
        }

        .project p {
            color: #555;
        }

        @media (max-width: 700px) {
            #projects {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>나의 p5.js 작품 모음</h1>
        <p>아래 작품을 클릭하여 실행해 보세요.</p>
    </header>

    <section id="projects">

        <div class="project">
            <a href="project1.html">
                <h2>프로젝트 1</h2>
                <p>마우스를 따라 움직이는 원</p>
            </a>
        </div>

        <div class="project">
            <a href="project2.html">
                <h2>프로젝트 2</h2>
                <p>색상이 변화하는 배경</p>
            </a>
        </div>

        <div class="project">
            <a href="project3.html">
                <h2>프로젝트 3</h2>
                <p>애니메이션 도형 작품</p>
            </a>
        </div>

        <div class="project">
            <a href="project4.html">
                <h2>프로젝트 4</h2>
                <p>인터랙티브 아트 작품</p>
            </a>
        </div>

    </section>

</body>
</html>
